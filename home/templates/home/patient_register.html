{% extends 'home/base.html' %}

{% block content %}
<div class="container py-5 mt-4">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card border-0 shadow-lg overflow-hidden" style="border-radius: 25px;">
                <div class="card-header bg-info text-white text-center py-5">
                    <div class="display-3 mb-3">
                        <i class="bi bi-person-plus-fill"></i>
                    </div>
                    <h2 class="fw-bold mb-0 text-uppercase letter-spacing-1">Patient Registration</h2>
                    <p class="mb-0 opacity-75">Join Surya Hospital Digital Healthcare</p>
                </div>
                <div class="card-body p-5 bg-white">
                    {% if error %}
                    <div class="alert alert-danger border-0 shadow-sm mb-4 animate-fade-in">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ error }}
                    </div>
                    {% endif %}

                    <form method="POST">
                        {% csrf_token %}
                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <label for="username" class="form-label fw-bold">Username</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i
                                            class="bi bi-person-circle text-info"></i></span>
                                    <input type="text" name="username" id="username"
                                        class="form-control bg-light border-start-0 py-2" placeholder="Choose username"
                                        autocomplete="off" required>
                                </div>
                            </div>
                            <div class="col-md-6 mb-4">
                                <label for="full_name" class="form-label fw-bold">Full Name</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i
                                            class="bi bi-person-badge text-info"></i></span>
                                    <input type="text" name="full_name" id="full_name"
                                        class="form-control bg-light border-start-0 py-2" placeholder="Enter full name"
                                        required>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <label for="email" class="form-label fw-bold">Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i
                                            class="bi bi-envelope-at text-info"></i></span>
                                    <input type="email" name="email" id="email"
                                        class="form-control bg-light border-start-0 py-2" placeholder="name@example.com"
                                        autocomplete="off" required>
                                </div>
                            </div>
                            <div class="col-md-6 mb-4">
                                <label for="contact" class="form-label fw-bold">Contact Number</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i
                                            class="bi bi-telephone-plus text-info"></i></span>
                                    <input type="text" name="contact" id="contact"
                                        class="form-control bg-light border-start-0 py-2" placeholder="1234567890"
                                        required>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <label for="blood_group" class="form-label fw-bold">Blood Group</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i
                                            class="bi bi-droplet-fill text-danger"></i></span>
                                    <select name="blood_group" class="form-select bg-light border-start-0 py-2">
                                        <option value="">Select Blood Group</option>
                                        <option value="A+">A+</option>
                                        <option value="A-">A-</option>
                                        <option value="B+">B+</option>
                                        <option value="B-">B-</option>
                                        <option value="O+">O+</option>
                                        <option value="O-">O-</option>
                                        <option value="AB+">AB+</option>
                                        <option value="AB-">AB-</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6 mb-4">
                                <label for="dob" class="form-label fw-bold">Date of Birth</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i
                                            class="bi bi-calendar-event text-info"></i></span>
                                    <input type="date" name="dob" id="dob"
                                        class="form-control bg-light border-start-0 py-2" max="2026-02-21" required>
                                </div>
                                <small class="text-muted"><i class="bi bi-info-circle me-1"></i> Past dates only</small>
                            </div>
                        </div>

                        <div class="mb-5">
                            <label for="password" class="form-label fw-bold">Secure Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i
                                        class="bi bi-shield-lock-fill text-info"></i></span>
                                <input type="password" name="password" id="password"
                                    class="form-control bg-light border-start-0 py-2" placeholder="••••••••"
                                    autocomplete="new-password" required>
                            </div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit"
                                class="btn btn-info btn-lg rounded-pill fw-bold text-white shadow-sm py-3 mt-2 transition-all hover-lift">
                                Complete Registration <i class="bi bi-arrow-right-circle-fill ms-2"></i>
                            </button>
                        </div>

                        <div class="text-center mt-4">
                            <p class="text-muted small">Already registered? <a href="{% url 'patient_login' %}"
                                    class="fw-bold text-info text-decoration-none">Login to Portal</a></p>
                        </div>
                    </form>
                </div>
            </div>
            <div class="text-center mt-4 mb-5">
                <a href="{% url 'home' %}" class="btn btn-link text-muted text-decoration-none small">
                    <i class="bi bi-house-door-fill me-1"></i> Return Home
                </a>
            </div>
        </div>
    </div>
</div>

<style>
    body {
        background-color: #f0f4f8;
    }

    .letter-spacing-1 {
        letter-spacing: 1px;
    }

    .form-control,
    .form-select {
        border: 1px solid #e2e8f0;
        font-size: 0.95rem;
    }

    .form-control:focus,
    .form-select:focus {
        box-shadow: 0 0 0 4px rgba(13, 202, 240, 0.1);
        border-color: #0dcaf0;
    }

    .btn-info {
        background: linear-gradient(45deg, #0dcaf0, #008eb4);
        border: none;
    }

    .hover-lift:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1) !important;
        filter: brightness(1.05);
    }

    .animate-fade-in {
        animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(-5px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .font-monospace {
        font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace !important;
        font-size: 0.8rem;
    }
</style>

<script>
    // Set max date for Date of Birth to today
    document.addEventListener('DOMContentLoaded', function () {
        const dobInput = document.getElementById('dob');
        if (dobInput) {
            const today = new Date().toISOString().split('T')[0];
            dobInput.setAttribute('max', today);
        }
    });
</script>
{% endblock %}
