{% extends 'home/base.html' %}

{% block content %}
<div class="container py-5 mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-lg overflow-hidden" style="border-radius: 20px;">
                <div class="card-header bg-info text-dark text-center py-5">
                    <div class="display-3 mb-3">
                        <i class="bi bi-chat-left-dots-fill"></i>
                    </div>
                    <h2 class="fw-bold mb-0">Verify OTP</h2>
                    <p class="mb-0 opacity-75">Enter the 6-digit OTP sent to {{ email }}</p>
                </div>
                <div class="card-body p-5">
                    {% if message %}
                    <div class="alert alert-danger border-0 shadow-sm mb-4">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ message }}
                    </div>
                    {% endif %}

                    <p class="text-muted text-center mb-4">OTP is valid for 5 minutes.
                    </p>

                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label for="otp" class="form-label fw-bold">6-Digit OTP</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i
                                        class="bi bi-123"></i></span>
                                <input type="text" name="otp" id="otp"
                                    class="form-control bg-light border-start-0 py-2" placeholder="000000"
                                    maxlength="6" required>
                            </div>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit"
                                class="btn btn-info btn-lg rounded-pill fw-bold shadow-sm py-3 mt-2">
                                Verify OTP <i class="bi bi-check-circle ms-2"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
            <div class="text-center mt-4">
                <a href="{% url 'forgot_password' %}" class="btn btn-link text-muted text-decoration-none small">
                    <i class="bi bi-arrow-left"></i> Resend OTP (Go Back)
                </a>
            </div>
        </div>
    </div>
</div>

<style>
    body {
        background-color: #e6f7ff;
    }

    .input-group-text {
        color: #6c757d;
    }

    .form-control:focus {
        box-shadow: none;
        border-color: #0dcaf0;
    }
</style>
{% endblock %}
