{% extends 'home/base.html' %}

{% block content %}
<div class="container py-5 mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-lg overflow-hidden" style="border-radius: 20px;">
                <div class="card-header bg-danger text-white text-center py-5">
                    <div class="display-3 mb-3">
                        <i class="bi bi-shield-lock-fill"></i>
                    </div>
                    <h2 class="fw-bold mb-0">Reset Password</h2>
                    <p class="mb-0 opacity-75">Updating account for: {{ email }}</p>
                </div>
                <div class="card-body p-5">
                    {% if message %}
                    <div class="alert alert-danger border-0 shadow-sm mb-4">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ message }}
                    </div>
                    {% endif %}

                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label for="password" class="form-label fw-bold">New Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i
                                        class="bi bi-lock-fill"></i></span>
                                <input type="password" name="password" id="password"
                                    class="form-control bg-light border-start-0 py-2" placeholder="••••••••" required>
                            </div>
                        </div>
                        <div class="mb-5">
                            <label for="confirm_password" class="form-label fw-bold">Confirm New Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i
                                        class="bi bi-lock-check-fill"></i></span>
                                <input type="password" name="confirm_password" id="confirm_password"
                                    class="form-control bg-light border-start-0 py-2" placeholder="••••••••" required>
                            </div>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit"
                                class="btn btn-danger btn-lg rounded-pill fw-bold shadow-sm py-3 mt-2">
                                Set New Password <i class="bi bi-check-lg ms-2"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    body {
        background-color: #fff5f5;
    }

    .input-group-text {
        color: #6c757d;
    }

    .form-control:focus {
        box-shadow: none;
        border-color: #dc3545;
    }
</style>
{% endblock %}
