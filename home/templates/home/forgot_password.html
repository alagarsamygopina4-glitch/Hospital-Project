                                                               nnnnnn                                                                                     v{% extends 'home/base.html' %}

{% block content %}
<div class="container py-5 mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-lg overflow-hidden" style="border-radius: 20px;">
                <div class="card-header bg-warning text-dark text-center py-5">
                    <div class="display-3 mb-3">
                        <i class="bi bi-key-fill"></i>
                    </div>
                    <h2 class="fw-bold mb-0">Forgot Password</h2>
                    <p class="mb-0 opacity-75">Recover your Surya Hospital account</p>
                </div>
                <div class="card-body p-5">
                    {% if message %}
                    <div class="alert alert-danger border-0 shadow-sm mb-4">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ message }}
                    </div>
                    {% endif %}

                    <p class="text-muted text-center mb-4">Enter your registered email address to reset your password.
                    </p>

                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label for="email" class="form-label fw-bold">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i
                                        class="bi bi-envelope-fill"></i></span>
                                <input type="email" name="email" id="email"
                                    class="form-control bg-light border-start-0 py-2" placeholder="email@example.com"
                                    required>
                            </div>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit"
                                class="btn btn-warning btn-lg rounded-pill fw-bold shadow-sm py-3 mt-2">
                                Verify Email <i class="bi bi-arrow-right-short ms-2"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
            <div class="text-center mt-4">
                <a href="{% url 'patient_login' %}" class="btn btn-link text-muted text-decoration-none small">
                    <i class="bi bi-arrow-left"></i> Back to Login
                </a>
            </div>
        </div>
    </div>
</div>

<style>
    body {
        background-color: #fff9e6;
    }

    .input-group-text {
        color: #6c757d;
    }

    .form-control:focus {
        box-shadow: none;
        border-color: #ffc107;
    }
</style>
{% endblock %}
