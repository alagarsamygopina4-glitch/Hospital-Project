{% extends 'home/base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg border-0">
                <div class="card-body p-5 text-center">
                    <h2 class="mb-4">⚠️ Cancel Appointment?</h2>
                    
                    <div class="alert alert-warning">
                        <p><strong>Doctor:</strong> {{ appointment.doctor.name }}</p>
                        <p><strong>Date:</strong> {{ appointment.appointment_date }}</p>
                        <p><strong>Time:</strong> {{ appointment.appointment_time }}</p>
                    </div>
                    
                    <p class="text-danger mb-4">This action cannot be undone.</p>
                    
                    <form method="POST" class="d-grid gap-2 d-md-flex justify-content-md-center">
                        {% csrf_token %}
                        <a href="{% url 'my_appointments' %}" class="btn btn-secondary btn-lg">Keep Appointment</a>
                        <button type="submit" class="btn btn-danger btn-lg">Yes, Cancel</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
